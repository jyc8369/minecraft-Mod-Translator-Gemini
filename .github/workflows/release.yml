name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build Windows package
        shell: cmd
        run: build_windows.bat

      - name: Zip Windows build
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          $outDir = "../artifacts/windows"
          if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Compress-Archive -Path "dist\MMTG\*" -DestinationPath "$outDir\MMTG-$version-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows/MMTG-*-windows.zip

  build-macos-arm64:
    runs-on: macos-26
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-arm64-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-arm64-py312-

      - name: Verify Python architecture
        run: |
          actual_arch="$(python3 -c 'import platform; print(platform.machine())')"
          if [ "$actual_arch" != "arm64" ]; then
            echo "Expected Python arch arm64, got $actual_arch" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/MMTG.app" "$out_dir/MMTG-${version}-macos-arm64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: release/artifacts/macos/MMTG-*-macos-arm64.zip

  build-macos-x86_64:
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-x64-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-x64-py312-

      - name: Verify Python architecture
        run: |
          actual_arch="$(python3 -c 'import platform; print(platform.machine())')"
          if [ "$actual_arch" != "x86_64" ]; then
            echo "Expected Python arch x86_64, got $actual_arch" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/MMTG.app" "$out_dir/MMTG-${version}-macos-x86_64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-release
          path: release/artifacts/macos/MMTG-*-macos-x86_64.zip

  build-linux-ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: release/build
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .deb
        run: |
          version="${RELEASE_VERSION#v}"
          out_dir="../artifacts/linux/ubuntu"
          pkgroot="../pkgroot/ubuntu"
          rm -rf "$out_dir" "$pkgroot"
          mkdir -p "$pkgroot/DEBIAN" "$pkgroot/opt/MMTG" "$pkgroot/usr/bin" "$out_dir"
          cp -R dist/MMTG/* "$pkgroot/opt/MMTG/"
          cat > "$pkgroot/usr/bin/mmtg" <<'EOF'
          #!/bin/sh
          exec /opt/MMTG/MMTG "$@"
          EOF
          chmod 755 "$pkgroot/usr/bin/mmtg"
          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: mmtg
          Version: ${version}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Codex
          Depends: python3
          Description: Minecraft Mod Translator Gemini
          EOF
          dpkg-deb --build "$pkgroot" "$out_dir/MMTG-${version}-ubuntu.deb"

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu-release
          path: release/artifacts/linux/ubuntu/MMTG-*-ubuntu.deb

  build-linux-debian:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: release/build
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .deb
        run: |
          version="${RELEASE_VERSION#v}"
          out_dir="../artifacts/linux/debian"
          pkgroot="../pkgroot/debian"
          rm -rf "$out_dir" "$pkgroot"
          mkdir -p "$pkgroot/DEBIAN" "$pkgroot/opt/MMTG" "$pkgroot/usr/bin" "$out_dir"
          cp -R dist/MMTG/* "$pkgroot/opt/MMTG/"
          cat > "$pkgroot/usr/bin/mmtg" <<'EOF'
          #!/bin/sh
          exec /opt/MMTG/MMTG "$@"
          EOF
          chmod 755 "$pkgroot/usr/bin/mmtg"
          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: mmtg
          Version: ${version}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Codex
          Depends: python3
          Description: Minecraft Mod Translator Gemini
          EOF
          dpkg-deb --build "$pkgroot" "$out_dir/MMTG-${version}-debian.deb"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-debian-release
          path: release/artifacts/linux/debian/MMTG-*-debian.deb

  build-linux-fedora:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: release/build
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .rpm
        run: sh "$GITHUB_WORKSPACE/release/build/package_fedora.sh" "$GITHUB_REF_NAME"

      - name: Upload Fedora artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-fedora-release
          path: release/artifacts/linux/fedora/MMTG-*-fedora.rpm

  build-linux-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: .
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm python python-pip git
          python -m venv "$GITHUB_WORKSPACE/.venv-arch"
          "$GITHUB_WORKSPACE/.venv-arch/bin/pip" install -r "$GITHUB_WORKSPACE/requirements.txt"
          "$GITHUB_WORKSPACE/.venv-arch/bin/pip" install pyinstaller

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.cache/pip
            ${{ github.workspace }}/.venv-arch
          key: pip-${{ runner.os }}-arch-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-arch-py312-

      - name: Prepare build user
        working-directory: .
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.venv-arch"

      - name: Build app
        working-directory: .
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE/release/build' && '$GITHUB_WORKSPACE/.venv-arch/bin/python' -m PyInstaller --noconfirm --clean 'Minecraft Mod Translator Gemini.spec'"

      - name: Package Arch package
        working-directory: .
        run: |
          su builder -c "sh '$GITHUB_WORKSPACE/release/build/package_arch.sh' '$RELEASE_VERSION'"

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-release
          path: release/artifacts/linux/arch/MMTG-*-arch.pkg.tar.zst

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x86_64
      - build-linux-ubuntu
      - build-linux-debian
      - build-linux-fedora
      - build-linux-arch
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-release
          path: release/artifacts/macos

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-release
          path: release/artifacts/macos

      - name: Download Linux Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-ubuntu-release
          path: release/artifacts/linux/ubuntu

      - name: Download Linux Debian artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-debian-release
          path: release/artifacts/linux/debian

      - name: Download Linux Fedora artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-fedora-release
          path: release/artifacts/linux/fedora

      - name: Download Linux Arch artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arch-release
          path: release/artifacts/linux/arch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/artifacts/windows/MMTG-windows.zip
            release/artifacts/macos/MMTG-macos-arm64.zip
            release/artifacts/macos/MMTG-macos-x86_64.zip
            release/artifacts/linux/ubuntu/MMTG-ubuntu.deb
            release/artifacts/linux/debian/MMTG-debian.deb
            release/artifacts/linux/fedora/MMTG-fedora.rpm
            release/artifacts/linux/arch/MMTG-arch.pkg.tar.zst
