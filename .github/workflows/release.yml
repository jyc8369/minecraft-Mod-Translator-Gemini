name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows package
        shell: cmd
        run: build_windows.bat

      - name: Zip Windows build
        shell: pwsh
        run: |
          $outDir = "../artifacts/windows"
          if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Compress-Archive -Path "dist\Minecraft-Mod-Translator-Gemini\*" -DestinationPath "$outDir\Minecraft-Mod-Translator-Gemini-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows/Minecraft-Mod-Translator-Gemini-windows.zip

  build-macos:
    runs-on: macos-latest
    needs:
      - build-windows
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/Minecraft Mod Translator Gemini.app" "$out_dir/Minecraft Mod Translator Gemini-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/artifacts/macos/Minecraft Mod Translator Gemini-macos.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/artifacts/windows/Minecraft-Mod-Translator-Gemini-windows.zip
            release/artifacts/macos/Minecraft Mod Translator Gemini-macos.zip
