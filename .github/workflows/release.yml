name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build Windows package
        shell: cmd
        run: build_windows.bat

      - name: Zip Windows build
        shell: pwsh
        run: |
          $outDir = "../artifacts/windows"
          if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Compress-Archive -Path "dist\MMTG\*" -DestinationPath "$outDir\MMTG-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows/MMTG-windows.zip

  build-macos:
    runs-on: macos-latest
    needs:
      - build-windows
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/MMTG.app" "$out_dir/MMTG-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/artifacts/macos/MMTG-macos.zip

  build-linux-ubuntu:
    runs-on: ubuntu-latest
    needs:
      - build-macos
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .deb
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/linux/ubuntu"
          pkgroot="../pkgroot/ubuntu"
          rm -rf "$out_dir" "$pkgroot"
          mkdir -p "$pkgroot/DEBIAN" "$pkgroot/opt/MMTG" "$pkgroot/usr/bin" "$out_dir"
          cp -R dist/MMTG/* "$pkgroot/opt/MMTG/"
          cat > "$pkgroot/usr/bin/mmtg" <<'EOF'
#!/bin/sh
exec /opt/MMTG/MMTG "$@"
EOF
          chmod 755 "$pkgroot/usr/bin/mmtg"
          cat > "$pkgroot/DEBIAN/control" <<EOF
Package: mmtg
Version: ${version}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: Codex
Depends: python3
Description: Minecraft Mod Translator Gemini
EOF
          dpkg-deb --build "$pkgroot" "$out_dir/MMTG-ubuntu.deb"

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu-release
          path: release/artifacts/linux/ubuntu/MMTG-ubuntu.deb

  build-linux-debian:
    runs-on: ubuntu-latest
    needs:
      - build-linux-ubuntu
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .deb
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/linux/debian"
          pkgroot="../pkgroot/debian"
          rm -rf "$out_dir" "$pkgroot"
          mkdir -p "$pkgroot/DEBIAN" "$pkgroot/opt/MMTG" "$pkgroot/usr/bin" "$out_dir"
          cp -R dist/MMTG/* "$pkgroot/opt/MMTG/"
          cat > "$pkgroot/usr/bin/mmtg" <<'EOF'
#!/bin/sh
exec /opt/MMTG/MMTG "$@"
EOF
          chmod 755 "$pkgroot/usr/bin/mmtg"
          cat > "$pkgroot/DEBIAN/control" <<EOF
Package: mmtg
Version: ${version}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: Codex
Depends: python3
Description: Minecraft Mod Translator Gemini
EOF
          dpkg-deb --build "$pkgroot" "$out_dir/MMTG-debian.deb"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-debian-release
          path: release/artifacts/linux/debian/MMTG-debian.deb

  build-linux-fedora:
    runs-on: ubuntu-latest
    needs:
      - build-linux-debian
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install -r ../../requirements.txt
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package .rpm
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/linux/fedora"
          rpmdir="../rpmbuild"
          rm -rf "$out_dir" "$rpmdir"
          mkdir -p "$rpmdir"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS} "$out_dir"
          tar -czf "$rpmdir/SOURCES/MMTG-${version}.tar.gz" -C dist MMTG
          cat > "$rpmdir/SPECS/mmtg.spec" <<EOF
Name: mmtg
Version: ${version}
Release: 1%{?dist}
Summary: Minecraft Mod Translator Gemini
License: MIT
URL: https://github.com/${{ github.repository }}
BuildArch: x86_64
Source0: MMTG-${version}.tar.gz
Provides: mmtg

%description
Minecraft Mod Translator Gemini

%prep
%setup -q -n MMTG

%build

%install
rm -rf %{buildroot}
mkdir -p %{buildroot}/opt/MMTG
cp -a * %{buildroot}/opt/MMTG/
mkdir -p %{buildroot}/usr/bin
cat > %{buildroot}/usr/bin/mmtg <<'SH'
#!/bin/sh
exec /opt/MMTG/MMTG "$@"
SH
chmod 755 %{buildroot}/usr/bin/mmtg

%files
/opt/MMTG
/usr/bin/mmtg
EOF
          rpmbuild --define "_topdir $rpmdir" -bb "$rpmdir/SPECS/mmtg.spec"
          cp "$rpmdir/RPMS/x86_64/"*.rpm "$out_dir/MMTG-fedora.rpm"

      - name: Upload Fedora artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-fedora-release
          path: release/artifacts/linux/fedora/MMTG-fedora.rpm

  build-linux-arch:
    runs-on: ubuntu-latest
    needs:
      - build-linux-fedora
    container:
      image: archlinux:base-devel
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm python python-pip git
          pip install -r ../../requirements.txt
          pip install pyinstaller

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          python3 -m PyInstaller --noconfirm --clean "Minecraft Mod Translator Gemini.spec"

      - name: Package Arch package
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/linux/arch"
          srcdir="../archpkg"
          rm -rf "$out_dir" "$srcdir"
          mkdir -p "$srcdir" "$out_dir"
          tar -czf "$srcdir/MMTG-${version}.tar.gz" -C dist MMTG
          cat > "$srcdir/PKGBUILD" <<EOF
pkgname=mmtg
pkgver=${version}
pkgrel=1
pkgdesc="Minecraft Mod Translator Gemini"
arch=('x86_64')
license=('MIT')
depends=('python')
source=("MMTG-${version}.tar.gz")
sha256sums=('SKIP')
package() {
  install -dm755 "\${pkgdir}/opt/MMTG"
  cp -a "\${srcdir}/MMTG" "\${pkgdir}/opt/MMTG/"
  install -dm755 "\${pkgdir}/usr/bin"
  cat > "\${pkgdir}/usr/bin/mmtg" <<'SH'
#!/bin/sh
exec /opt/MMTG/MMTG "$@"
SH
  chmod 755 "\${pkgdir}/usr/bin/mmtg"
}
EOF
          cd "$srcdir"
          makepkg --noconfirm --syncdeps --cleanbuild
          cp *.pkg.tar.zst "$out_dir/MMTG-arch.pkg.tar.zst"

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-release
          path: release/artifacts/linux/arch/MMTG-arch.pkg.tar.zst

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-arch
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/artifacts/macos

      - name: Download Linux Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-ubuntu-release
          path: release/artifacts/linux/ubuntu

      - name: Download Linux Debian artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-debian-release
          path: release/artifacts/linux/debian

      - name: Download Linux Fedora artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-fedora-release
          path: release/artifacts/linux/fedora

      - name: Download Linux Arch artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arch-release
          path: release/artifacts/linux/arch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/artifacts/windows/MMTG-windows.zip
            release/artifacts/macos/MMTG-macos.zip
            release/artifacts/linux/ubuntu/MMTG-ubuntu.deb
            release/artifacts/linux/debian/MMTG-debian.deb
            release/artifacts/linux/fedora/MMTG-fedora.rpm
            release/artifacts/linux/arch/MMTG-arch.pkg.tar.zst
