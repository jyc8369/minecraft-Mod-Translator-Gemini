name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows package
        shell: cmd
        run: build_windows.bat

      - name: Zip Windows build
        shell: pwsh
        run: |
          if (Test-Path release) { Remove-Item -Recurse -Force release }
          New-Item -ItemType Directory -Path release | Out-Null
          Compress-Archive -Path "dist\Minecraft-Mod-Translator-Gemini\*" -DestinationPath "release\Minecraft-Mod-Translator-Gemini-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/Minecraft-Mod-Translator-Gemini-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          rm -rf release
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/Minecraft Mod Translator Gemini.app" "release/Minecraft Mod Translator Gemini-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/Minecraft Mod Translator Gemini-macos.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Minecraft-Mod-Translator-Gemini-windows.zip
            release/Minecraft Mod Translator Gemini-macos.zip
